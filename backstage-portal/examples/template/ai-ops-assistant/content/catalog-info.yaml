apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ${{ values.service_name }}
  title: ${{ values.service_name }}
  description: ${{ values.description }}
  annotations:
    backstage.io/techdocs-ref: dir:.
    github.com/project-slug: ${{ values.repo_owner }}/${{ values.service_name }}
  tags:
    - ai
    - bedrock
  links:
    - url: https://${{ values.service_name }}.backstage.glaciar.org
      title: Service URL (docker-compose)
      icon: web
    - url: https://github.com/${{ values.repo_owner }}/${{ values.service_name }}
      title: GitHub Repository
      icon: github
    - url: https://console.aws.amazon.com/cloudwatch/home?region=${{ values.aws_region }}#logsV2:log-groups
      title: CloudWatch Logs
      icon: dashboard
    {%- if values.deploy_to_ecs %}
    - url: https://${{ values.service_name }}.${{ values.ecs_environment }}.backstage.glaciar.org
      title: ECS Service URL (${{ values.ecs_environment }})
      icon: cloud
    {%- endif %}
spec:
  type: service
  lifecycle: experimental
  owner: group:default/guests
