apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: ai-ops-assistant
  title: AI Ops Assistant
  description: Full-stack AI assistant with React chat UI and AWS Bedrock (Claude/Nova) backend. Customize the system prompt to give your assistant a personality.
  tags:
    - ai
    - bedrock
    - react
    - nodejs
    - recommended
spec:
  owner: user:Pabloin
  type: service

  parameters:
    - title: Service details
      required: [service_name, description]
      properties:
        service_name:
          title: Service name
          type: string
          description: Name of your AI assistant (used as repo name)
          pattern: '^[a-z0-9-]+$'
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: What does this assistant help with?

    - title: AI configuration
      required: [system_prompt, bedrock_model, aws_region]
      properties:
        system_prompt:
          title: System prompt
          type: string
          description: The assistant's personality and instructions. Stored in prompt.md — edit it later to change behavior.
          default: |
            You are an AI ops assistant. You help engineers understand services,
            diagnose incidents, and follow runbooks. Be concise and practical.
          ui:widget: textarea
          ui:options:
            rows: 6
        bedrock_model:
          title: Bedrock model
          type: string
          description: The foundation model to use
          default: anthropic.claude-3-haiku-20240307-v1:0
          enum:
            - anthropic.claude-3-haiku-20240307-v1:0
            - anthropic.claude-3-5-sonnet-20240620-v1:0
            - amazon.nova-lite-v1:0
            - amazon.nova-pro-v1:0
          enumNames:
            - 'Claude 3 Haiku (fast, recommended)'
            - 'Claude 3.5 Sonnet (higher quality)'
            - 'Nova Lite (AWS, very cheap)'
            - 'Nova Pro (AWS, balanced)'
        aws_region:
          title: AWS region
          type: string
          description: AWS region for the Bedrock endpoint
          default: us-east-1

    - title: Repository location
      required: [owner, repo_name]
      properties:
        owner:
          title: Organization
          type: string
          description: GitHub organization where the repo will be created
          default: mvp-glaciar-org
          enum:
            - mvp-glaciar-org
          enumNames:
            - 'mvp-glaciar-org'
        repo_name:
          title: Repository name
          type: string
          description: Name of the GitHub repository (will use service_name if empty)
          default: ${{ parameters.service_name }}
        create_dns:
          title: Create DNS record
          type: boolean
          description: Create {service_name}.backstage.glaciar.org pointing to the portal ALB
          default: true

    - title: Deploy to ECS (optional)
      properties:
        deploy_to_ecs:
          title: Deploy to shared ECS environment
          type: boolean
          description: Build a Docker image and deploy the service to the shared ECS cluster
          default: true
        ecs_environment:
          title: Target environment
          type: string
          description: Which shared ECS environment to deploy to
          default: dev
          enum:
            - dev
            - prod
          enumNames:
            - 'dev — my-app.dev.backstage.glaciar.org'
            - 'prod — my-app.prod.backstage.glaciar.org'

  steps:
    - id: fetch
      name: Fetch template
      action: fetch:template
      input:
        url: ./content
        values:
          service_name: ${{ parameters.service_name }}
          description: ${{ parameters.description }}
          system_prompt: ${{ parameters.system_prompt }}
          bedrock_model: ${{ parameters.bedrock_model }}
          aws_region: ${{ parameters.aws_region }}
          repo_owner: ${{ parameters.owner }}
          deploy_to_ecs: ${{ parameters.deploy_to_ecs }}
          ecs_environment: ${{ parameters.ecs_environment }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?owner=${{ parameters.owner }}&repo=${{ parameters.repo_name }}
        defaultBranch: main
        repoVisibility: public
        protectDefaultBranch: false
        gitAuthorName: backstage-bot
        gitAuthorEmail: backstage@glaciar.org

    - id: create-dns
      name: Create DNS record
      if: ${{ parameters.create_dns }}
      action: aws:route53:create-dns-record
      input:
        serviceName: ${{ parameters.service_name }}
        environment: ${{ parameters.ecs_environment if parameters.deploy_to_ecs else 'dev' }}

    - id: register
      name: Register in catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        catalogInfoPath: /catalog-info.yaml

    - id: deploy-ecs
      name: Deploy to ECS
      if: ${{ parameters.deploy_to_ecs }}
      action: github:actions:dispatch
      input:
        repoUrl: github.com?owner=Pabloin&repo=DevOpsDays-BA
        workflowId: deploy-service.yml
        branchOrTagName: main
        workflowInputs:
          service_name: ${{ parameters.repo_name }}
          environment: ${{ parameters.ecs_environment }}
          bedrock_model_id: ${{ parameters.bedrock_model }}

  output:
    links:
      - title: Repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in Backstage catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: Service URL (docker-compose)
        url: https://${{ parameters.service_name }}.backstage.glaciar.org
      - title: ECS Service URL
        url: https://${{ parameters.repo_name }}.${{ parameters.ecs_environment }}.backstage.glaciar.org
